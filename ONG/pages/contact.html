<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Viitorul Verde Moldova</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="index.html"><img src="assets/images/logo.png" alt="Logo" /></a>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="misiune.html">Misiune</a>
                <a href="proiecte.html">Proiecte</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="page-title">
            <h1>Contact</h1>
        </section>
        <section class="contact-page">
            <div class="contact-grid">
                <div class="map-card">
                    <div class="map-placeholder">
                        <iframe
                            src="https://www.openstreetmap.org/export/embed.html?bbox=28.8000%2C47.0100%2C28.9600%2C47.1100&layer=mapnik"
                            loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"
                            title="Harta ONG"
                        ></iframe>
                    </div>
                </div>
                <div class="form-card">
                    <h2>Scrie-ne</h2>
                    <form class="contact-form">
                        <label>Nume
                            <input type="text" name="nume" placeholder="Nume">
                        </label>
                        <label>Telefon
                            <input type="tel" name="telefon" placeholder="Telefon">
                        </label>
                        <label>Mesaj
                            <textarea name="mesaj" placeholder="Mesaj"></textarea>
                        </label>
                        <button type="submit" class="btn-submit">Trimite</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="container footer-inner">
            <nav class="footer-nav">
                <a href="index.html">Home</a>
                <a href="misiune.html">Misiune</a>
                <a href="proiecte.html">Proiecte</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </footer>
</body>
</html>
