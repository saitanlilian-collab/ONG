<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voluntariat — Viitorul Verde Moldova</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="index.html"><img src="assets/images/logo.png" alt="Logo" /></a>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="misiune.html">Misiune</a>
                <a href="proiecte.html">Proiecte</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="page-title">
            <h1>Devino voluntar</h1>
        </section>
        <section class="volunteer-grid">
            <div class="benefits-box">
                <h2>Beneficii</h2>
                <ul>
                    <li><label><input type="radio" name="beneficiu"> Experienta</label></li>
                    <li><label><input type="radio" name="beneficiu"> Prieteni noi</label></li>
                    <li><label><input type="radio" name="beneficiu"> Activitati eco</label></li>
                    <li><label><input type="radio" name="beneficiu"> Certificate</label></li>
                </ul>
            </div>
            <div class="form-box">
                <h2>Formular</h2>
                <form class="volunteer-form">
                    <label>Nume
                        <input type="text" name="nume" placeholder="Nume">
                    </label>
                    <label>Prenume
                        <input type="text" name="prenume" placeholder="Prenume">
                    </label>
                    <label>Telefon
                        <input type="tel" name="telefon" placeholder="Telefon">
                    </label>
                    <label>Email
                        <input type="email" name="email" placeholder="Email">
                    </label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="domeniu" value="plantari"> Plantari</label>
                        <label><input type="checkbox" name="domeniu" value="reciclare"> Reciclare</label>
                        <label><input type="checkbox" name="domeniu" value="educatie"> Educatie</label>
                        <label><input type="checkbox" name="domeniu" value="evenimente"> Evenimente</label>
                    </div>
                    <button type="submit" class="btn-submit">Trimite</button>
                </form>
            </div>
        </section>
    </main>
    <footer class="site-footer">
        <div class="container footer-inner">
            <nav class="footer-nav">
                <a href="index.html">Home</a>
                <a href="misiune.html">Misiune</a>
                <a href="proiecte.html">Proiecte</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </footer>
</body>
</html>
